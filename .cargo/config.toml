rustflags = [
    "-C", "link-arg=-B/home/clouderic/.rustup/toolchains/stable-x86_64-unknown-linux-musl/lib/rustlib/x86_64-unknown-linux-musl/bin/gcc-ld",
    "-C", "link-arg=-L/home/clouderic/.local/lib",
