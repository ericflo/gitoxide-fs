name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install libfuse3-dev
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
      - name: Run clippy (warnings only, not blocking)
        run: cargo clippy 2>&1 || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libfuse3-dev
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: Run unit and integration tests (excluding FUSE mount tests)
        run: |
          cargo test --lib -- --test-threads=1
          cargo test --test test_agentic --test test_cli --test test_concurrency --test test_config --test test_edge_cases --test test_error_recovery --test test_file_operations --test test_fork_merge --test test_git_integration --test test_links --test test_xattr -- --test-threads=1
