name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: gofs-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: gofs-linux-aarch64.tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: gofs-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: gofs-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libfuse3-dev (Linux native)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3

      - name: Install cross (Linux cross-compile)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install macFUSE (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask macfuse

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary (native)
        if: '!matrix.cross'
        env:
          # macFUSE installs pkg-config files here
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/opt/homebrew/lib/pkgconfig
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: strip target/${{ matrix.target }}/release/gofs

      - name: Strip binary (Linux cross)
        if: matrix.cross
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/gofs

      - name: Generate shell completions and man page
        if: '!matrix.cross'
        run: |
          mkdir -p dist/completions
          ./target/${{ matrix.target }}/release/gofs completions bash > dist/completions/gofs.bash
          ./target/${{ matrix.target }}/release/gofs completions zsh > dist/completions/_gofs
          ./target/${{ matrix.target }}/release/gofs completions fish > dist/completions/gofs.fish
          ./target/${{ matrix.target }}/release/gofs manpage > dist/gofs.1

      - name: Generate shell completions and man page (cross — use native build)
        if: matrix.cross
        run: |
          # Build a native binary just for generating completions
          sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3
          cargo build --release
          mkdir -p dist/completions
          ./target/release/gofs completions bash > dist/completions/gofs.bash
          ./target/release/gofs completions zsh > dist/completions/_gofs
          ./target/release/gofs completions fish > dist/completions/gofs.fish
          ./target/release/gofs manpage > dist/gofs.1

      - name: Package release archive
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/gofs staging/
          cp README.md LICENSE staging/
          if [ -d dist/completions ]; then
            cp -r dist/completions staging/
            cp dist/gofs.1 staging/
          fi
          cd staging
          tar czf ../${{ matrix.archive }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Collect all archives
          FILES=$(find artifacts -name '*.tar.gz' -type f)
          gh release create "$TAG" \
            --title "gofs $TAG" \
            --generate-notes \
            $FILES
